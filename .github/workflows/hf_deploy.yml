name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
    paths:
      - 'backend(FastAPI+Python)/**'

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Solo enviamos el contenido de la carpeta backend al Space de HF
          # Para que el Dockerfile quede en la raíz del Space
          git config --global user.email "robe-arango-academy@example.com"
          git config --global user.name "Epic Dreams Studio Academy"
          
          # Creamos una rama temporal con el contenido de la carpeta backend
          git subtree push --prefix="backend(FastAPI+Python)" https://robe9312:$HF_TOKEN@huggingface.co/spaces/robe9312/epic-dreams-backend main

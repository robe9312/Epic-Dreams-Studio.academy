name: Sync Database to Supabase

on:
  push:
    branches: [main]
    paths:
      - 'database(Supabase SQL)/**'
      - '.github/workflows/supabase_sync.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Apply Script to Supabase
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          # Extraemos el ID del proyecto de la URL (ej: https://abc.supabase.co -> abc)
          PROJECT_ID=$(echo $SUPABASE_URL | sed -e 's/https:\/\///' -e 's/\.supabase\.co//')
          
          # Aplicamos el esquema usando psql (nativo en ubuntu-latest) 
          # Usamos el puerto del Pooler (6543) para garantizar una conexión estable en entornos CI
          PGPASSWORD="$SUPABASE_DB_PASSWORD" psql -h "db.$PROJECT_ID.supabase.co" -p 6543 -d postgres -U postgres -f "database(Supabase SQL)/v2_schema.sql"

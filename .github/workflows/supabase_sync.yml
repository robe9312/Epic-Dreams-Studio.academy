name: Sync Database to Supabase

on:
  push:
    branches: [main]
    paths:
      - 'database(Supabase SQL)/**'
      - '.github/workflows/supabase_sync.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Apply Script to Supabase
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          # Extraemos el ID del proyecto de la URL (ej: https://abc.supabase.co -> abc)
          PROJECT_ID=$(echo $SUPABASE_URL | sed -e 's/https:\/\///' -e 's/\.supabase\.co//')
          
          # 1. Resolvemos a IPv4 y encodeamos el password usando Python (nativo en ubuntu-latest)
          # Esto evita:
          # - Errores de red 'IPv6 unreachable'
          # - Errores de caracteres especiales en el password (#, @, etc.)
          export SUPABASE_IPV4=$(python3 -c "import socket; print(socket.gethostbyname('db.$PROJECT_ID.supabase.co'))")
          export ENCODED_PASS=$(python3 -c "import urllib.parse; print(urllib.parse.quote(\"\"\"$SUPABASE_DB_PASSWORD\"\"\"))")
          
          echo "Sincronizando con: $PROJECT_ID (IPv4: $SUPABASE_IPV4)"
          
          # 2. Aplicamos el esquema usando el formato URI con la IP y el password seguros
          psql "postgresql://postgres:$ENCODED_PASS@$SUPABASE_IPV4:6543/postgres" -f "database(Supabase SQL)/v2_schema.sql"

name: Sync Database to Supabase

on:
  push:
    branches: [main]
    paths:
      - 'database(Supabase SQL)/**'
      - '.github/workflows/supabase_sync.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Apply Script to Supabase
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          # Extraemos el ID del proyecto de la URL (ej: https://abc.supabase.co -> abc)
          PROJECT_ID=$(echo $SUPABASE_URL | sed -e 's/https:\/\///' -e 's/\.supabase\.co//')
          
          echo "Sincronizando con proyecto: $PROJECT_ID (Puerto 6543)"
          
          # 2. Aplicamos el esquema usando el formato de cadena de conexión (URI)
          # Esto evita confusiones con sockets locales si la resolución de host es ambigua
          psql "postgresql://postgres:$SUPABASE_DB_PASSWORD@db.$PROJECT_ID.supabase.co:6543/postgres" -f "database(Supabase SQL)/v2_schema.sql"

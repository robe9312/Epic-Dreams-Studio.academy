name: Sync Database to Supabase

on:
  push:
    branches: [main]
    paths:
      - 'database(Supabase SQL)/**'
      - '.github/workflows/supabase_sync.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Apply Script to Supabase
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          # Extraemos el ID del proyecto de la URL (ej: https://abc.supabase.co -> abc)
          PROJECT_ID=$(echo $SUPABASE_URL | sed -e 's/https:\/\///' -e 's/\.supabase\.co//')
          
          # 1. Resolvemos explícitamente a IPv4 para evitar errores de red en GitHub Actions (Network is unreachable)
          # Buscamos la primera dirección IPv4 del host de Supabase
          IPV4_ADDR=$(getent ahostsv4 "db.$PROJECT_ID.supabase.co" | head -n 1 | awk '{print $1}')
          echo "Conectando via IPv4 a: $IPV4_ADDR ($PROJECT_ID)"
          
          # 2. Aplicamos el esquema usando la IP resuelta y el puerto del Pooler (6543)
          PGPASSWORD="$SUPABASE_DB_PASSWORD" psql -h "$IPV4_ADDR" -p 6543 -d postgres -U postgres -f "database(Supabase SQL)/v2_schema.sql"
